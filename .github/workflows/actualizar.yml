name: Actualizar Estado de Rutas

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Subir cambios al repositorio
        run: |
          git config --global user.name "Bot de Rutas"
          git config --global user.email "action@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || echo "No había stash, continuando..."
          git add estado.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "Actualización automática del estado de rutas"
            git push origin main
          else
            echo "No hay cambios para subir."
          fi
