- name: Subir cambios al repositorio
      run: |
        git config --global user.name "Bot de Rutas"
        git config --global user.email "action@github.com"
        # 1. Guardamos los cambios hechos por el scraper en un "bolsillo"
        git stash
        # 2. Nos actualizamos con la nube
        git pull --rebase origin main
        # 3. Sacamos los cambios del "bolsillo"
        git stash pop || echo "No había stash, continuando..."
        # 4. Ahora sí, preparamos y subimos
        git add estado.json
        if ! git diff-index --quiet HEAD; then
          git commit -m "Actualización automática del estado de rutas"
          git push origin main
        else
          echo "No hay cambios para subir."
        fi
