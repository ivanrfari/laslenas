<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F4F8">
<meta name="color-scheme" content="light">

<title>Rutas — Las Leñas</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/26f0_fe0f/512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F2F4F8;
  --surface: #FFFFFF;
  --text: #111827;
  --text-muted: #6B7280;
  --accent: #2563EB;
  --accent-light: #EFF6FF;
  --green: #10B981;
  --green-light: #ECFDF5;
  --orange: #F59E0B;
  --orange-light: #FFFBEB;
  --red: #EF4444;
  --red-light: #FEF2F2;
  --radius: 28px;
  --safe-t: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

html, body {
  height: 100%; background: var(--bg); color: var(--text); overflow: hidden; overscroll-behavior-y: none;
}

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* ── ENCABEZADO ── */
.header { padding: calc(var(--safe-t) + 20px) 24px 10px; display: flex; justify-content: space-between; align-items: center; }
.header-title h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.header-subtitle { font-size: 13px; color: var(--text-muted); font-weight: 700; display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

.btn-refresh {
  width: 48px; height: 48px; border-radius: 16px; background: var(--surface);
  border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; font-size: 20px;
  color: var(--text); cursor: pointer;
}
#rf-icon { transition: transform 0.1s ease-out; }
.spinning { animation: spin 0.6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONTENIDO ── */
.scroll-area { flex: 1; overflow-y: auto; padding: 10px 20px 40px; display: flex; flex-direction: column; gap: 16px; }
.bento-card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); }
.card-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 16px; }

/* ── TARJETA RUTA ── */
.ruta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ruta-name { font-size: 24px; font-weight: 800; }
.ruta-chip { padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 700; }
.chip-ok { background: var(--green-light); color: var(--green); }
.chip-warn { background: var(--orange-light); color: var(--orange); }
.chip-danger { background: var(--red-light); color: var(--red); }
.ruta-text { font-size: 15px; line-height: 1.6; color: var(--text-muted); font-weight: 500; }

/* ── TARJETA CLIMA ── */
.weather-main { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #F3F4F6; }
.w-icon { font-size: 42px; }
.w-temp { font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.w-desc { font-size: 14px; color: var(--text-muted); font-weight: 700; margin-top: 4px; }
.weather-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
.wg-day { font-size: 13px; font-weight: 800; color: var(--text); }
.wg-icon { font-size: 20px; margin: 6px 0; }
.wg-temps { font-size: 13px; font-weight: 700; color: var(--text-muted); }

/* ========================================================
   MÁSCARA DE RECORTE (TIJERAS PARA PISTAS)
   ======================================================== */
.iframe-viewport {
  width: 100%;
  height: 400px; /* Alto de la ventanita visible en tu pantalla */
  border-radius: var(--radius);
  overflow-y: auto; /* Permite que deslices el dedo hacia abajo */
  overflow-x: hidden;
  background: var(--surface);
  box-shadow: 0 8px 30px rgba(0,0,0,0.03);
  position: relative;
}

.iframe-clipper {
  width: 100%;
  position: relative;
  overflow: hidden; /* Todo lo que se pase de esta altura, se corta (Publicidades) */
  /* ↓↓↓ AJUSTE DE CORTE INFERIOR ↓↓↓ */
  /* Si ves la publicidad, achicá este número. Si se te corta Sogalift, agrandalo. */
  height: 980px; 
}

.iframe-clipper iframe {
  position: absolute;
  left: 0;
  width: 100%;
  height: 3000px;
  border: none;
  pointer-events: none; /* Evita toques falsos */
  /* ↓↓↓ AJUSTE DE CORTE SUPERIOR ↓↓↓ */
  /* Si todavía ves el cuadro azul, poné un número más negativo (ej: -720px). */
  /* Si se corta la palabra "Medios", poné un número menos negativo (ej: -660px). */
  top: -695px; 
}

/* ── BOTÓN INSTALAR ── */
#install-btn {
  display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--surface); padding: 16px 28px; border-radius: 100px;
  font-size: 15px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border: none; cursor: pointer; align-items: center; gap: 10px; z-index: 1000;
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-title">
      <h1>Las Leñas</h1>
      <div class="header-subtitle">
        <div class="dot"></div>
        <span>Actualizado <span id="utime">--:--</span></span>
      </div>
    </div>
    <button class="btn-refresh" onclick="refresh()">
      <span id="rf-icon">↻</span>
    </button>
  </header>

  <div class="scroll-area" id="scroll-area">
    
    <div class="bento-card">
      <div class="card-title">Acceso principal</div>
      <div class="ruta-header">
        <div class="ruta-name">RP 222</div>
        <div class="ruta-chip chip-warn" id="chip-222">...</div>
      </div>
      <div class="ruta-text" id="txt-222">Conectando con el servidor...</div>
    </div>

    <div class="bento-card">
      <div class="card-title">Pronóstico de la montaña</div>
      <div id="wx-container">
        <div style="text-align: center; color: var(--text-muted); font-weight: 700; padding: 20px 0;">Cargando clima...</div>
      </div>
    </div>

    <!-- TARJETA RECORTADA -->
    <div>
      <div class="card-title" style="margin-left: 8px;">Medios de Elevación</div>
      <div class="iframe-viewport">
        <div class="iframe-clipper">
          <iframe src="https://laslenas.com/estado-pistas/medios/" scrolling="no"></iframe>
        </div>
      </div>
    </div>

  </div>
</div>

<button id="install-btn"><span>📲</span> Instalar App</button>

<script>
// ── REGISTRO PWA ──
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
let promptInstalacion; const btnInstalar = document.getElementById('install-btn');
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); promptInstalacion = e; btnInstalar.style.display = 'flex'; });
btnInstalar.addEventListener('click', async () => { btnInstalar.style.display = 'none'; promptInstalacion.prompt(); await promptInstalacion.userChoice; promptInstalacion = null; });

// ── PULL-TO-REFRESH ──
const contentEl = document.getElementById('scroll-area');
const rfIcon = document.getElementById('rf-icon');
let startY = 0, currentY = 0, isPulling = false;

contentEl.addEventListener('touchstart', (e) => {
  if (contentEl.scrollTop === 0) { startY = e.touches[0].clientY; isPulling = true; rfIcon.style.transition = 'none'; }
}, {passive: true});

contentEl.addEventListener('touchmove', (e) => {
  if (!isPulling) return;
  currentY = e.touches[0].clientY;
  const pullDist = currentY - startY;
  if (pullDist > 0 && contentEl.scrollTop === 0) {
    if (e.cancelable) e.preventDefault();
    rfIcon.style.transform = `rotate(${pullDist * 2}deg)`;
  }
}, {passive: false});

contentEl.addEventListener('touchend', () => {
  if (!isPulling) return;
  isPulling = false;
  if (currentY - startY > 80) { rfIcon.style.transform = ''; refresh(); } 
  else { rfIcon.style.transition = 'transform 0.3s ease-out'; rfIcon.style.transform = `rotate(0deg)`; }
});

// ── LÓGICA DE DATOS ──
function setTime() {
  const n = new Date();
  document.getElementById('utime').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function refresh() {
  const ic = document.getElementById('rf-icon');
  ic.style.transition = ''; ic.classList.add('spinning');
  loadWeather(); loadRouteStatus();
  // Engañamos al iframe obligándolo a recargarse para obtener los datos de medios frescos
  const iframe = document.querySelector('iframe');
  iframe.src = iframe.src; 
  setTimeout(() => { ic.classList.remove('spinning'); setTime(); }, 800);
}

async function loadRouteStatus() {
  try {
    const res = await fetch('./estado.json?t=' + new Date().getTime());
    const data = await res.json();
    
    const chip = document.getElementById('chip-222');
    document.getElementById('txt-222').textContent = data.rp222.texto;
    
    if (data.rp222.tipo === 'danger') { chip.className = 'ruta-chip chip-danger'; chip.textContent = 'Cerrada'; } 
    else if (data.rp222.tipo === 'warn') { chip.className = 'ruta-chip chip-warn'; chip.textContent = 'Cadenas / Precaución'; } 
    else { chip.className = 'ruta-chip chip-ok'; chip.textContent = 'Transitable'; }
  } catch(e) {
    document.getElementById('txt-222').textContent = "Esperando la primera actualización...";
  }
}

async function loadWeather() {
  const container = document.getElementById('wx-container');
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-35.1448&longitude=-70.0813&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=America%2FArgentina%2FMendoza&forecast_days=4');
    const data = await res.json();
    const codes = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️', 51:'🌧️', 53:'🌧️', 55:'🌧️', 61:'🌧️', 63:'🌧️', 65:'🌧️', 71:'❄️', 73:'❄️', 75:'❄️', 77:'❄️', 80:'🌦️', 81:'🌦️', 82:'🌧️', 85:'❄️', 86:'❄️', 95:'⛈️', 96:'⛈️', 99:'⛈️' };
    const currTemp = Math.round(data.current.temperature_2m);
    const currIcon = codes[data.current.weather_code] || '⛅';
    
    let html = `
      <div class="weather-main">
        <div class="w-icon">${currIcon}</div>
        <div>
          <div class="w-temp">${currTemp}°</div>
          <div class="w-desc">Sensación actual</div>
        </div>
      </div>
      <div class="weather-grid">`;
      
    const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    for(let i=1; i<4; i++) {
      const date = new Date(data.daily.time[i] + 'T12:00:00');
      const min = Math.round(data.daily.temperature_2m_min[i]);
      const max = Math.round(data.daily.temperature_2m_max[i]);
      html += `
        <div>
          <div class="wg-day">${i===1 ? 'Mañana' : days[date.getDay()]}</div>
          <div class="wg-icon">${codes[data.daily.weather_code[i]] || '⛅'}</div>
          <div class="wg-temps">${min}° / ${max}°</div>
        </div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
  } catch(e) {}
}

setTime(); loadWeather(); loadRouteStatus();
</script>
</body>
</html>
