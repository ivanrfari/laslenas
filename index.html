<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rutas Las Leñas</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#fdfdfd; --surface:#ffffff; --border:#f1f3f4; --text:#1f2024; --text2:#5f6368; --shadow:0 4px 20px rgba(0,0,0,.04); }
body { font-family: 'Google Sans', sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 480px; margin: 0 auto; }
.slabel { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--text2); margin: 24px 0 12px; }
.card { background: var(--surface); border-radius: 20px; box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border); }
.iframe-wrap { width: 100%; height: 600px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<h1>Rutas Las Leñas</h1>
<div class="slabel">Estado de Rutas</div>
<div class="card" id="ruta-card">Cargando...</div>

<div class="slabel">Medios de Elevación</div>
<div class="iframe-wrap">
  <iframe src="https://laslenas.com/estado-pistas/medios/"></iframe>
</div>

<script>
async function loadStatus() {
  const res = await fetch('./estado.json?t=' + new Date().getTime());
  const data = await res.json();
  document.getElementById('ruta-card').innerHTML = `<strong>RP 222:</strong> ${data.rp222.texto}`;
}
loadStatus();
</script>
</body>
</html>
